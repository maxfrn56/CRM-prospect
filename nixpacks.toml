[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x", "openssl"]
aptPkgs = [
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2",
  "libpango-1.0-0",
  "libcairo2",
  "fonts-liberation",
]

[phases.install]
cmds = ["npm ci", "npx playwright install chromium"]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/root/.cache/ms-playwright"

[start]
cmd = "npm start"
